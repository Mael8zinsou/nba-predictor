# Build + scan + publish des images Docker backend et frontend sur GHCR
# (GitHub Container Registry, gratuit pour repos publics).
#
# Politique :
#   - PR (event=pull_request)       : build seul, scan Trivy, PAS de push
#   - Push sur main (event=push)    : build, scan, push avec tag :main + :sha
#   - Tag git v* (event=release)    : build, scan, push avec tag :semver + :latest
#
# Images publiées :
#   - ghcr.io/<owner>/nba-backend:<tag>
#   - ghcr.io/<owner>/nba-frontend:<tag>
#
# Le badge "build passing" peut pointer vers ce workflow dans le README.

name: Docker

on:
  push:
    branches: [main]
    paths:
      - "nba-api/**"
      - "nba-web/**"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main]
    paths:
      - "nba-api/**"
      - "nba-web/**"
      - ".github/workflows/docker.yml"
  release:
    types: [published]

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write        # nécessaire pour push sur GHCR
  security-events: write # pour upload des résultats Trivy dans GitHub Security
  actions: read          # requis par codeql-action/upload-sarif pour récupérer les métadonnées du run

jobs:
  build-scan-push:
    name: Build, scan & push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: nba-backend
            context: nba-api
          - name: nba-frontend
            context: nba-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login GHCR (uniquement si on va push : pas sur les PR)
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Calcul des tags via docker/metadata-action
      # - sur push main      : nba-backend:main, nba-backend:<sha>
      # - sur release v1.2.3 : nba-backend:1.2.3, nba-backend:1.2, nba-backend:latest
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      # Build (sans push) pour pouvoir scanner avant publication
      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          push: false
          load: true
          tags: ${{ matrix.image.name }}:scan
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      # --- Trivy : scan de vulnérabilités ---
      # On pilote Trivy nous-mêmes plutôt que via aquasecurity/trivy-action
      # qui s'est cassé 4 fois (versions inexistantes, deps cassées,
      # install.sh exit 1). Installation via le dépôt apt officiel d'Aqua
      # = stable et auditable.
      #
      # Mode bloquant activé en Vague 4.2 (--exit-code 1) :
      # le backend est passé sur image distroless (CVE OS réduites de ~250 à
      # ~10) et les CVE Python deps corrigeables (fastapi, python-multipart)
      # ont été bumpées. Les CVE restantes (OS distroless impatchable côté
      # projet + 1 starlette qui demande un bump fastapi majeur) sont listées
      # explicitement dans .trivyignore avec une date de revisit.
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Trivy scan (table, HIGH/CRITICAL, fail on new CVE)
        # Affiche le résumé lisible. --exit-code 1 = bloque la CI si nouvelle
        # CVE non listée dans .trivyignore. --ignorefile pointe vers le fichier
        # racine du repo (vivre avec ces CVE est documenté ligne par ligne).
        run: |
          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --exit-code 1 \
            ${{ matrix.image.name }}:scan

      - name: Trivy scan (SARIF for GitHub Security)
        if: always()
        run: |
          trivy image \
            --format sarif \
            --output trivy-${{ matrix.image.name }}.sarif \
            --severity MEDIUM,HIGH,CRITICAL \
            ${{ matrix.image.name }}:scan

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}

      # Push final (uniquement si pas PR et scan OK)
      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
