# Test d'intégration end-to-end : démarre un cluster kind, déploie l'app NBA
# via le Makefile, vérifie que l'API répond.
#
# Périmètre : on teste ce qui est réellement portable en CI (cluster + app NBA),
# pas Airflow + monitoring qui prennent trop de temps et de RAM pour un free
# tier GitHub Actions (~14 Go RAM, mais Helm Airflow demande ~3 Go et 5+ min).
# Si on veut tester Airflow en CI : self-hosted runner ou matrix avec test
# séparé (à voir en V5).
#
# Durée typique : ~3-5 min par run.

name: K8s Integration

on:
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - "nba-api/**"
      - "nba-web/**"
      - "Makefile"
      - ".github/workflows/k8s-integration.yml"
  pull_request:
    branches: [main]
    paths:
      - "k8s/**"
      - "nba-api/**"
      - "nba-web/**"
      - "Makefile"
      - ".github/workflows/k8s-integration.yml"

concurrency:
  group: k8s-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-and-test:
    name: kind + make nba + smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # Crée un cluster kind avec notre config (1 control-plane + 1 worker,
      # port mapping 30081 frontend uniquement). Le CNI par defaut est
      # desactive (cf. kind-config.yaml) car on veut Calico pour les
      # NetworkPolicies (V4.3). Tant que Calico n'est pas installe, les
      # nodes restent NotReady -- d'ou wait_for_node: false ci-dessous.
      - name: Create kind cluster (CNI disabled, waiting for Calico)
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: nba-predictor
          config: k8s/kind-config.yaml
          node_image: kindest/node:v1.32.2
          version: v0.27.0  # version de kind elle-même, alignée avec containerd 2.x du runner
          wait: 0s  # ne pas attendre que les nodes soient Ready (sans CNI ils ne le seront jamais)

      - name: Install Calico (CNI + NetworkPolicy controller)
        run: |
          kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.2/manifests/tigera-operator.yaml
          kubectl wait --for=condition=Available deployment/tigera-operator -n tigera-operator --timeout=120s
          kubectl apply -f k8s/calico-installation.yaml
          kubectl wait --for=condition=Ready nodes --all --timeout=180s

      # V4.4 : metrics-server requis pour le HPA (sinon HPA reste a <unknown>).
      # Patch --kubelet-insecure-tls obligatoire sur kind (certs self-signed).
      - name: Install metrics-server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl patch deployment metrics-server -n kube-system --type='json' \
            -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
          kubectl wait --for=condition=Available deployment/metrics-server -n kube-system --timeout=120s

      # V4.5 : ingress-nginx controller requis pour router nba.localhost.
      # Manifest "kind-friendly" qui configure le nodeSelector ingress-ready=true.
      - name: Install ingress-nginx controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.3/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=Ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=180s

      - name: Verify cluster is up
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -n ingress-nginx

      # Build images applicatives + chargement dans kind (= make build)
      # On utilise les commandes directement plutôt que make pour avoir un
      # output plus lisible dans la CI (et éviter les soucis SHELL bash).
      - name: Build backend image
        run: docker build -t nba-backend:1.2 ./nba-api

      - name: Build frontend image
        run: docker build -t nba-frontend:1.0 ./nba-web

      # Workaround : sur runner GitHub Actions, `kind load docker-image` échoue
      # avec "failed to detect containerd snapshotter" à cause d'une mismatch
      # entre la config containerd du runner et celle du node kind. On passe
      # par un tarball intermédiaire (docker save → kind load image-archive)
      # qui contourne le problème. En local (WSL/Docker Desktop), `kind load
      # docker-image` direct marche très bien (cf. make build).
      - name: Load images into kind (via tarball)
        run: |
          docker save -o /tmp/nba-backend.tar nba-backend:1.2
          docker save -o /tmp/nba-frontend.tar nba-frontend:1.0
          kind load image-archive /tmp/nba-backend.tar --name nba-predictor
          kind load image-archive /tmp/nba-frontend.tar --name nba-predictor

      # Déploie l'app via Kustomize (= make nba)
      - name: Deploy NBA app
        run: kubectl apply -k k8s/overlays/dev

      - name: Wait for pods Ready
        run: |
          kubectl wait --for=condition=Ready pod \
            -l app=nba-backend -n nba --timeout=120s
          kubectl wait --for=condition=Ready pod \
            -l app=nba-frontend -n nba --timeout=60s

      # Smoke tests via l'Ingress nba.localhost (V4.5).
      # On utilise --resolve pour eviter d'editer /etc/hosts du runner.
      # Le trafic passe par : ingress-nginx -> frontend nginx (ClusterIP)
      # -> reverse-proxy /api/* -> nba-backend-svc (ClusterIP).
      - name: Smoke test /api/nba/predict (via Ingress)
        run: |
          response=$(curl -sf --resolve "nba.localhost:80:127.0.0.1" "http://nba.localhost/api/nba/predict?\
          TOV=2&GP=82&MIN=28&PTS=14&FGM=5&FGA=11&FGP=0.45&\
          PM=2&PA=5&PAP=0.40&FTM=2&FTA=3&FTP=0.67&\
          OREB=1&DREB=4&REB=5&AST=4&STL=1&BLK=0.5")
          echo "Response: $response"
          echo "$response" | grep -q '"prediction"' || { echo "Missing prediction"; exit 1; }
          echo "$response" | grep -q '"decision"' || { echo "Missing decision"; exit 1; }

      - name: Smoke test /api/nba/info (via Ingress)
        run: |
          response=$(curl -sf --resolve "nba.localhost:80:127.0.0.1" "http://nba.localhost/api/nba/info?Name=Brandon%20Ingram")
          echo "Response: $response"
          echo "$response" | grep -q '"decision"' || { echo "Missing decision"; exit 1; }

      - name: Verify HPA + PDB are ready
        run: |
          kubectl get hpa,pdb -n nba
          # HPA peut etre <unknown> pendant 30s, on attend qu'il converge
          for i in $(seq 1 12); do
            current=$(kubectl get hpa nba-backend -n nba -o jsonpath='{.status.currentMetrics[0].resource.current.averageUtilization}' 2>/dev/null)
            if [ -n "$current" ]; then
              echo "HPA stabilise : ${current}% CPU"
              break
            fi
            echo "Attente HPA ($i/12)..."
            sleep 5
          done

      - name: Smoke test /metrics (via kubectl exec, route ops non publique)
        run: |
          # /metrics n'est pas reverse-proxy par nginx (volontaire : route Prometheus
          # interne, scrapee via ServiceMonitor). On la teste directement dans un
          # pod backend.
          POD=$(kubectl get pod -n nba -l app=nba-backend -o jsonpath='{.items[0].metadata.name}')
          response=$(kubectl exec -n nba "$POD" -- python -c "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:8080/metrics').read().decode())")
          echo "$response" | grep -q 'nba_api_requests_total' || { echo "Missing metric"; exit 1; }

      # Si quelque chose a foiré, on dump les logs pour diagnostic
      - name: Dump pod logs on failure
        if: failure()
        run: |
          echo "=== Pods nba ==="
          kubectl get pods,svc -n nba -o wide
          echo ""
          echo "=== Events nba ==="
          kubectl get events -n nba --sort-by='.lastTimestamp'
          echo ""
          echo "=== Backend logs ==="
          kubectl logs -n nba -l app=nba-backend --tail=100 || true
          echo ""
          echo "=== Frontend logs ==="
          kubectl logs -n nba -l app=nba-frontend --tail=50 || true
