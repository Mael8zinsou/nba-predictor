# Configuration du cluster kind (Kubernetes-in-Docker) pour le dev local.
#
# Topologie : 1 control-plane + 1 worker
#   - control-plane : héberge le control-plane K8s (etcd, apiserver, scheduler, controller)
#   - worker        : héberge les workloads applicatifs (nba, monitoring, airflow)
#   Mimique grossièrement une topologie prod minimale, permet de tester
#   nodeSelector / anti-affinity sans complexifier le setup.
#
# Port mapping (extraPortMappings) :
#   - 80  -> nginx-ingress controller (host: nba.localhost)
#   - 443 -> idem (TLS, prepare pour cert-manager futur)
#   Permet 'curl http://nba.localhost/api/nba/predict?...' (resolution locale
#   via /etc/hosts ou WSL host file ; nba.localhost = 127.0.0.1 par convention).
#   L'ingress-nginx controller route ensuite vers nba-frontend-svc (ClusterIP).
#
# Le control-plane porte le label `ingress-ready=true` requis par le chart
# ingress-nginx pour scheduler le controller (nodeSelector du chart).
#
# Historique :
#   V4.3 : 30081 NodePort frontend (remplace par Ingress en V4.5)
#   V4.5 : single entry point via Ingress (pattern production-like)
#
# Doc kind : https://kind.sigs.k8s.io/docs/user/configuration/
# Doc ingress-nginx + kind : https://kind.sigs.k8s.io/docs/user/ingress/

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: nba-predictor

# V4.3 : on désactive le CNI par défaut (kindnet) pour installer Calico.
# Raison : kindnet ne supporte pas les NetworkPolicies (deny par défaut +
# allows ciblés). Calico installe son propre CNI + son controller de policies.
# Sans cette ligne, les NetworkPolicies sont déployées mais ignorées.
# Le cluster reste NotReady après création tant que Calico n'est pas installé
# (voir make cluster-up qui enchaine kind create + install Calico).
networking:
  disableDefaultCNI: true
  podSubnet: "192.168.0.0/16"  # Subnet par defaut de Calico (sinon overlap)

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      # Label requis par le chart ingress-nginx (nodeSelector ingress-ready=true)
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
