apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nba-backend
  namespace: monitoring
  labels:
      release: kube-prom
spec:
  namespaceSelector:
    matchNames:
      - nba
  selector:
    matchLabels:
      app: nba-backend
  endpoints:
    - port: http
      path: /metrics
      interval: 15s