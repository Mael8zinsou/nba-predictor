apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-postgres-pvc
  namespace: airflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-postgres
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-postgres
  template:
    metadata:
      labels:
        app: airflow-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            # POSTGRES_DB et POSTGRES_USER restent en clair : ce sont des
            # identifiants conventionnels, pas des secrets cryptographiques.
            - name: POSTGRES_DB
              value: airflow
            - name: POSTGRES_USER
              value: airflow
          # POSTGRES_PASSWORD vient du SealedSecret airflow-postgres-secret
          # (cf. k8s/base/airflow-credentials-sealedsecret.yaml).
          # Le controller sealed-secrets déchiffre côté cluster -> Secret K8s
          # standard que postgres lit via envFrom.
          envFrom:
            - secretRef:
                name: airflow-postgres-secret
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: airflow-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-postgres
  namespace: airflow
spec:
  selector:
    app: airflow-postgres
  ports:
    - port: 5432
      targetPort: 5432
