# Base manifests for the NBA application namespace.
# Common to all environments. Environment-specific overrides live in
# k8s/overlays/<env>/kustomization.yaml.
#
# Notes:
#   - Services are ClusterIP by default; NodePorts are an overlay-only concern
#     (cf. overlays/dev for local kind cluster).
#   - imagePullPolicy defaults to IfNotPresent; overlays/dev forces Never since
#     images are loaded via `kind load docker-image` from Docker Desktop and
#     are not available in any remote registry.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Note : backend-servicemonitor.yaml n'est PAS inclus ici. Le CRD ServiceMonitor
# est fourni par le chart kube-prometheus-stack (monitoring). Si on l'incluait,
# `make nba` planterait quand monitoring n'est pas encore installé.
# Le ServiceMonitor est appliqué séparément par la cible `make monitoring`,
# après installation du chart Helm.
resources:
  - namespace.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  # V4.3 : NetworkPolicies du namespace nba (default-deny + allows minimaux).
  # Les NP d'airflow et monitoring sont appliquees separement (cf. Makefile,
  # cibles 'airflow' et 'monitoring') car leurs namespaces sont crees par
  # Helm en dehors de Kustomize.
  - networkpolicies-nba.yaml
  # V4.4 : HorizontalPodAutoscaler (CPU-based, min=2 max=5, threshold 70%).
  # Necessite metrics-server installe (make metrics-server-install).
  - backend-hpa.yaml
  # V4.5 : Ingress + PodDisruptionBudgets.
  # Necessite ingress-nginx controller installe (make ingress-install) + resolution
  # DNS de nba.localhost vers 127.0.0.1 (cf. nba-ingress.yaml).
  - nba-ingress.yaml
  - backend-pdb.yaml
  - frontend-pdb.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: nba-predictor
