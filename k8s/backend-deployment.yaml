apiVersion: apps/v1
kind: Deployment
metadata:
  name: nba-backend
  namespace: nba
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nba-backend
  template:
    metadata:
      labels:
        app: nba-backend
    spec:
      containers:
        - name: backend
          image: nba-backend:1.1
          #imagePullPolicy: IfNotPresent
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /docs
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /docs
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
